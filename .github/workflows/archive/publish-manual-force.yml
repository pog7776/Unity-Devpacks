name: Manual Publish (Force Overwrite)

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Force publish all packages
        run: |
          find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/_Template/*" | while read -r manifest; do
            dir=$(dirname "$manifest")
            echo "Processing package in $dir"
          
            cd "$dir"
            pkg_name=$(node -p "require('./package.json').name")
            pkg_version=$(node -p "require('./package.json').version")
          
            echo "Force publishing $pkg_name to scope @pog7776..."
            npm config set @pog7776:registry=https://npm.pkg.github.com/
            npm publish --registry=https://npm.pkg.github.com/@pog7776
          
            cd - > /dev/null
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}