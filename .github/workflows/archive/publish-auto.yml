name: Publish Unity Packages (Auto)

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish updated packages
        run: |
          find . -name "package.json" -not -path "*/node_modules/*" -not -path "*/_Template/*" | while read -r manifest; do
            dir=$(dirname "$manifest")
            echo "Processing package in $dir"
          
            cd "$dir"
            pkg_name=$(node -p "require('./package.json').name")
            pkg_version=$(node -p "require('./package.json').version")
            scoped_name="@pog7776/$pkg_name"
          
            echo "Checking if $scoped_name@$pkg_version is already published..."
            if npm view "$scoped_name@$pkg_version" version >/dev/null 2>&1; then
              echo "$scoped_name@$pkg_version already exists. Skipping."
            else
              echo "Publishing $pkg_name to scope @pog7776..."
              npm config set @pog7776:registry=https://npm.pkg.github.com/
              npm publish --registry=https://npm.pkg.github.com/@pog7776
            fi
          
            cd - > /dev/null
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}