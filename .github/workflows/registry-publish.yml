name: Publish to Private Registry

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Unity UPM CLI
        run: |
          curl -fsSL https://cdn.packages.unity.com/upm-cli/install.sh | bash
          echo "$HOME/.upm/bin" >> $GITHUB_PATH

      # STEP 1: Separate Authentication Identity Layer
      - name: Authenticate Registry
        run: |
          echo "//npm.tricklecharge.dev:8443/:_authToken=${{ secrets.NODE_AUTH_TOKEN }}" > ~/.npmrc

      # STEP 2: Compile, Sign, and Gather Artifacts
      - name: Pack and Sign UPM Packages
        env:
          UPM_SERVICE_ACCOUNT_KEY_ID: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_ID }}
          UPM_SERVICE_ACCOUNT_KEY_SECRET: ${{ secrets.UPM_SERVICE_ACCOUNT_KEY_SECRET }}
        shell: bash
        run: |
          # Create a central distribution folder to aggregate all signed outputs
          mkdir -p signed-dist
          
          for dir in Packages/com.tricklecharge.*/; do
            if [ -f "${dir}package.json" ]; then
              pkg_name=$(basename "$dir")
              echo "Signing package: $pkg_name"
          
              upm pack "$dir" \
                --organization-id ${{ secrets.UNITY_ORG_ID }} \
                --destination ./signed-dist
            fi
          done

      # STEP 3: Deploy Final Tarballs to Verdaccio
      - name: Publish Packages to Verdaccio
        shell: bash
        run: |
          if [ -z "$(ls -A signed-dist/*.tgz 2>/dev/null)" ]; then
            echo "No signed tarballs found to deploy."
            exit 0
          fi
          
          for tgz in ./signed-dist/*.tgz; do
            echo "Publishing archive: $tgz"
            npm publish "$tgz" --registry https://npm.tricklecharge.dev:8443 || echo "Notice: Skipping duplicate version."
          done