name: Export Unity Packages (.unitypackage)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export-packages:
    name: Batch Export Unity Packages 📦
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # Bridge the gap between your repo root and the hidden Unity project
      - name: Symlink Packages to Unity Host
        run: |
          # Creates a shortcut so Unity sees 'Packages' inside '.github/UnityHost'
          ln -s $GITHUB_WORKSPACE/Packages $GITHUB_WORKSPACE/.github/UnityHost/Packages
          
          # Generate the manifest.json if one doesn't exist
          if [ ! -f Packages/manifest.json ]; then
            echo '{"dependencies": {}}' > Packages/manifest.json
          fi

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: .github/UnityHost/Library
          key: Library-MultiExport
          restore-keys: |
            Library-

      - name: Run Unity Export
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          # Point the builder to the hidden folder
          projectPath: .github/UnityHost
          customParameters: -batchmode -nographics -executeMethod MultiPackageExporter.ExportAllPackages -quit

      - name: Upload Generated Packages
        uses: actions/upload-artifact@v4
        with:
          name: TrickleCharge-UnityPackages
          # The C# script will now output the build folder inside the UnityHost directory
          path: .github/UnityHost/build/*.unitypackage